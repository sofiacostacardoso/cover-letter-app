<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cover Letter Generator – Sofia Cardoso</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --wine: #7a1c1c;
    --wine-light: #a32828;
    --wine-pale: #f5eeee;
    --ink: #1a1010;
    --muted: #6b5555;
    --border: #d9c8c8;
    --bg: #faf7f5;
    --white: #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 0;
  }

  /* Header */
  header {
    background: var(--wine);
    color: white;
    padding: 2.5rem 3rem 2rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
  }

  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.8rem;
    font-weight: 300;
    line-height: 1;
    letter-spacing: -0.01em;
  }

  header h1 span {
    font-style: italic;
    font-weight: 600;
  }

  header p {
    font-size: 0.65rem;
    opacity: 0.6;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-align: right;
    line-height: 1.6;
  }

  /* Main layout */
  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 3rem 2rem 4rem;
  }

  /* Step labels */
  .step-label {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--wine);
    margin-bottom: 0.6rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .step-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* URL Input */
  .input-section {
    margin-bottom: 2.5rem;
  }

  .url-row {
    display: flex;
    gap: 0;
    border: 1.5px solid var(--border);
    background: var(--white);
    transition: border-color 0.2s;
  }

  .url-row:focus-within {
    border-color: var(--wine);
  }

  .url-row input {
    flex: 1;
    padding: 1rem 1.2rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    border: none;
    outline: none;
    background: transparent;
    color: var(--ink);
  }

  .url-row input::placeholder {
    color: var(--border);
  }

  .url-row button {
    padding: 0 1.8rem;
    background: var(--wine);
    color: white;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }

  .url-row button:hover { background: var(--wine-light); }
  .url-row button:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Tone selector */
  .tone-section {
    margin-bottom: 2.5rem;
  }

  .tone-options {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .tone-btn {
    padding: 0.5rem 1.1rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 1.5px solid var(--border);
    background: var(--white);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .tone-btn:hover { border-color: var(--wine); color: var(--wine); }

  .tone-btn.active {
    background: var(--wine);
    border-color: var(--wine);
    color: white;
  }

  /* Status bar */
  #status-bar {
    display: none;
    align-items: center;
    gap: 0.8rem;
    padding: 0.9rem 1.2rem;
    background: var(--wine-pale);
    border-left: 3px solid var(--wine);
    margin-bottom: 2rem;
    font-size: 0.7rem;
    color: var(--wine);
    letter-spacing: 0.05em;
  }

  #status-bar.visible { display: flex; }

  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--wine);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Output */
  #output-section {
    display: none;
    animation: fadeUp 0.4s ease;
  }

  #output-section.visible { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .output-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }

  .output-actions {
    display: flex;
    gap: 0.5rem;
  }

  .action-btn {
    padding: 0.45rem 1rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border: 1.5px solid var(--border);
    background: var(--white);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .action-btn:hover { border-color: var(--wine); color: var(--wine); }

  .action-btn.primary {
    background: var(--wine);
    border-color: var(--wine);
    color: white;
  }

  .action-btn.primary:hover { background: var(--wine-light); }

  /* Letter display */
  #letter-display {
    background: var(--white);
    border: 1.5px solid var(--border);
    padding: 3rem 3.5rem;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    line-height: 1.8;
    color: var(--ink);
    white-space: pre-wrap;
    min-height: 200px;
    position: relative;
  }

  /* Editable */
  #letter-editable {
    display: none;
    width: 100%;
    min-height: 500px;
    background: var(--white);
    border: 1.5px solid var(--wine);
    padding: 3rem 3.5rem;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    line-height: 1.8;
    color: var(--ink);
    resize: vertical;
    outline: none;
  }

  /* Error */
  #error-msg {
    display: none;
    padding: 0.9rem 1.2rem;
    background: #fff0f0;
    border-left: 3px solid #c0392b;
    color: #c0392b;
    font-size: 0.72rem;
    letter-spacing: 0.03em;
    margin-bottom: 1.5rem;
  }

  #error-msg.visible { display: block; }

  /* Decorative */
  .deco-line {
    height: 1px;
    background: linear-gradient(to right, var(--wine), transparent);
    margin: 3rem 0;
    opacity: 0.3;
  }

  @media (max-width: 600px) {
    header { padding: 1.8rem 1.5rem; flex-direction: column; align-items: flex-start; }
    header p { text-align: left; }
    main { padding: 2rem 1.2rem 3rem; }
    #letter-display, #letter-editable { padding: 2rem 1.5rem; }
    .url-row button { padding: 0 1rem; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Cover Letter<br><span>Generator</span></h1>
  </div>
  <p>Sofia Cardoso<br>R&D Product Engineer<br>Aveiro, Portugal</p>
</header>

<main>

  <div class="input-section">
    <div class="step-label">01 — Job posting URL</div>
    <div class="url-row">
      <input type="url" id="url-input" placeholder="https://linkedin.com/jobs/view/... or any job board URL" />
      <button id="generate-btn" onclick="generateLetter()">Generate</button>
    </div>
  </div>

  <div class="input-section">
    <div class="step-label">02 — Job description <span style="opacity:0.5;font-size:0.55rem">(paste here if URL is inaccessible)</span></div>
    <textarea id="job-desc-input" placeholder="Paste the full job description here as a fallback, or leave empty if the URL works…" style="width:100%;min-height:130px;padding:1rem 1.2rem;font-family:'DM Mono',monospace;font-size:0.78rem;line-height:1.6;border:1.5px solid var(--border);background:var(--white);color:var(--ink);resize:vertical;outline:none;transition:border-color 0.2s;" onfocus="this.style.borderColor='var(--wine)'" onblur="this.style.borderColor='var(--border)'"></textarea>
  </div>

  <div class="tone-section">
    <div class="step-label">03 — Tone</div>
    <div class="tone-options">
      <button class="tone-btn active" onclick="setTone(this, 'professional')">Professional</button>
      <button class="tone-btn" onclick="setTone(this, 'enthusiastic')">Enthusiastic</button>
      <button class="tone-btn" onclick="setTone(this, 'concise')">Concise</button>
      <button class="tone-btn" onclick="setTone(this, 'creative')">Creative</button>
    </div>
  </div>

  <div class="tone-section">
    <div class="step-label">04 — Language</div>
    <div class="tone-options">
      <button class="tone-btn active" onclick="setLang(this, 'English (UK)')">🇬🇧 English (UK)</button>
      <button class="tone-btn" onclick="setLang(this, 'Portuguese (PT)')">🇵🇹 Português (PT)</button>
    </div>
  </div>

  <div id="error-msg"></div>
  <div id="status-bar"><div class="spinner"></div><span id="status-text">Fetching job details…</span></div>

  <div id="output-section">
    <div class="output-header">
      <div class="step-label" style="margin:0; flex:1">05 — Your cover letter</div>
      <div class="output-actions">
        <button class="action-btn" onclick="toggleEdit()">Edit</button>
        <button class="action-btn" onclick="copyLetter()">Copy</button>
        <button class="action-btn primary" onclick="downloadLetter()">Download .txt</button>
      </div>
    </div>
    <div id="letter-display"></div>
    <textarea id="letter-editable" spellcheck="true"></textarea>
  </div>

</main>

<script>
const CV_DATA = `
Name: Sofia Cardoso
Location: Aveiro, Portugal
Email: sofiacardoso24@gmail.com
Phone: +351 935 905 283

SUMMARY:
R&D Product Engineer driving the full hardware development cycle from concept to assembly. Proficient in 3D CAD with dedicated experience in sheet metal design and structural validation using static FEA and mesh refinement. A fast learner committed to continuous product improvement and rigorous deadline management.

EDUCATION:
- MSc in Product Design Engineering, University of Aveiro
  Master Thesis: "Development of the Encapsulation for a Multipurpose Sensing Platform for Improved Road Safety" — Grade: 18/20

EXPERIENCE:
- Junior Product Design Engineer | MAKE IT Product R&D | Ílhavo, Aveiro | June 2025 – Present
  • Full-Cycle R&D & CAD: Engineered end-to-end mechanical solutions and complex sheet metal assemblies using CAD software
  • Structural Validation: Performed static FEA using targeted mesh refinement to ensure high-fidelity validation against yielding and buckling
  • DFM & Prototyping: Optimized part geometries for manufacturing (GD&T) and conducted hands-on 3D printing, assembly and lab testing
  • Cross-Industry Application: Engineered solutions for high-end medical devices and multidisciplinary hydro-mechanical control systems (thermoregulators, venturis, injectors)
  • Project Management: Autonomously generated 2D fabrication drawings, managed complex BOMs and sourced electromechanical components

- Head of Communications | Nexus – UA Motorsports | Aveiro | Sep 2023 – Dec 2024
  • Built and led a communications department from scratch within a high-performance engineering team, developing brand guidelines and promotional content while implementing rigorous monthly strategies to meet strict deadlines

SKILLS:
- CAD & Engineering: Fusion 360, SolidWorks, AutoCAD | Static FEA (Stress Analysis, Mesh Refinement) | GD&T, FMEA, DFM
- Manufacturing: Sheet Metal Design, 3D Printing, Material Selection, Laser Cutting, CNC Machining
- Project Management: BOM creation, Technical 2D Drawings, Sourcing, Lab Testing & Prototyping

LANGUAGES: Portuguese (Native), English (Professional), Spanish (Limited)
CERTIFICATIONS: Finance for U All @ Ser+; Roca One Day Design Challenge; Cambridge B2 (FCE)
`;

let selectedTone = 'professional';
let selectedLang = 'English (UK)';
let generatedLetter = '';
let isEditing = false;

function setTone(btn, tone) {
  btn.closest('.tone-options').querySelectorAll('.tone-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedTone = tone;
}

function setLang(btn, lang) {
  // Only toggle within language buttons
  btn.closest('.tone-options').querySelectorAll('.tone-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedLang = lang;
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('visible');
}

function hideError() {
  document.getElementById('error-msg').classList.remove('visible');
}

function setStatus(msg, visible) {
  const bar = document.getElementById('status-bar');
  document.getElementById('status-text').textContent = msg;
  bar.classList.toggle('visible', visible);
}

async function generateLetter() {
  const url = document.getElementById('url-input').value.trim();
  const jobDesc = document.getElementById('job-desc-input').value.trim();

  if (!url && !jobDesc) {
    showError('Please paste a job URL or the job description text.');
    return;
  }

  hideError();
  setStatus('Writing your tailored cover letter…', true);
  document.getElementById('generate-btn').disabled = true;
  document.getElementById('output-section').classList.remove('visible');

  const toneMap = {
    professional: 'formal and professional',
    enthusiastic: 'warm, enthusiastic and passionate',
    concise: 'concise and direct (max 3 short paragraphs)',
    creative: 'creative, memorable and slightly unconventional'
  };

  const jobContext = jobDesc
    ? `Here is the full job description provided by the user:\n\n${jobDesc}${url ? `\n\nJob posting URL for reference: ${url}` : ''}`
    : `The user wants to apply for a job. Here is the job posting URL: ${url}\n\nPlease use the web_search tool to look up this URL and understand the role before writing.`;

  const prompt = `You are a professional cover letter writer. 

Here is the candidate's CV:
${CV_DATA}

${jobContext}

Please write a compelling, tailored cover letter for Sofia Cardoso applying to this role.
- Language: Write the entire letter in ${selectedLang}. Use spelling, vocabulary and conventions native to that locale.
- Tone: ${toneMap[selectedTone]}
- Format: Start with the date and a greeting, then 3-4 paragraphs, then a professional sign-off with Sofia's contact details
- Tailor the letter specifically to match Sofia's most relevant skills and experience to the job requirements
- Do NOT include placeholder text like [Company Name] — make reasonable inferences or write naturally without it
- Output ONLY the cover letter text, nothing else`;

  try {
    const response = await fetch("/api/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.error?.message || 'API error');
    }

    const text = data.content
      .filter(b => b.type === 'text')
      .map(b => b.text)
      .join('\n')
      .trim();

    if (!text) throw new Error('No letter was generated. Please try again.');

    generatedLetter = text;
    document.getElementById('letter-display').textContent = text;
    document.getElementById('letter-editable').value = text;
    document.getElementById('output-section').classList.add('visible');
    document.getElementById('output-section').scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch (err) {
    showError('Something went wrong: ' + err.message);
  } finally {
    setStatus('', false);
    document.getElementById('generate-btn').disabled = false;
  }
}

function toggleEdit() {
  const display = document.getElementById('letter-display');
  const editable = document.getElementById('letter-editable');
  const btn = document.querySelector('.action-btn[onclick="toggleEdit()"]');

  isEditing = !isEditing;
  if (isEditing) {
    editable.value = display.textContent;
    display.style.display = 'none';
    editable.style.display = 'block';
    editable.focus();
    btn.textContent = 'Done';
    btn.classList.add('primary');
  } else {
    generatedLetter = editable.value;
    display.textContent = editable.value;
    editable.style.display = 'none';
    display.style.display = 'block';
    btn.textContent = 'Edit';
    btn.classList.remove('primary');
  }
}

function copyLetter() {
  const text = isEditing
    ? document.getElementById('letter-editable').value
    : document.getElementById('letter-display').textContent;

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.action-btn[onclick="copyLetter()"]');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 2000);
  });
}

function downloadLetter() {
  const text = isEditing
    ? document.getElementById('letter-editable').value
    : document.getElementById('letter-display').textContent;

  const blob = new Blob([text], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'cover-letter-sofia-cardoso.txt';
  a.click();
}

document.getElementById('url-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') generateLetter();
});
</script>
</body>
</html>
